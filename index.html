<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유지윤 미로찾기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">Maze Challenge</p>
      <h1>유지윤 미로찾기</h1>
      <p class="hero-copy">
        방향키 또는 <strong>WASD</strong>로 출발점에서 도착점까지 이동하세요.
        새로운 미로를 만들고 가장 빠른 기록에 도전할 수 있습니다.
      </p>

      <div class="controls">
        <div class="difficulty-group" aria-label="난이도 선택">
          <button class="difficulty-button is-active" data-size="12" data-vision="-1" data-label="쉬움">쉬움</button>
          <button class="difficulty-button" data-size="18" data-vision="-1" data-label="보통">보통</button>
          <button class="difficulty-button" data-size="24" data-vision="2" data-label="어려움">어려움</button>
          <button class="difficulty-button" data-size="30" data-vision="1" data-label="극한">극한</button>
        </div>
        <button id="new-maze-button" class="primary-button">새 미로 만들기</button>
      </div>

      <div class="stats" aria-live="polite">
        <div class="stat-card">
          <span class="stat-label">시간</span>
          <strong id="time-display">00:00</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">이동 수</span>
          <strong id="move-display">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">현재 크기</span>
          <strong id="size-display">12 x 12</strong>
        </div>
      </div>

      <div id="message-box" class="message-box">
        시작점은 왼쪽 위, 도착점은 오른쪽 아래입니다.
      </div>
    </section>

    <section class="maze-panel">
      <div class="legend">
        <span><i class="legend-dot start"></i> 시작</span>
        <span><i class="legend-dot goal"></i> 도착</span>
        <span><i class="legend-dot player"></i> 현재 위치</span>
      </div>
      <div id="maze-board" class="maze-board" role="application" aria-label="미로찾기 게임"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
